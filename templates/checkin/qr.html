{% extends "base.html" %}
{% block title %}签到二维码 - {{ event.title }}{% endblock %}

{% block content %}
<div class="checkin-wrap">
    <div class="checkin-card glass" style="max-width:440px">
        <div class="event-label">{{ event.title }}</div>
        <h2 data-zh="签 到 二 维 码" data-en="CHECK-IN QR">签 到 二 维 码</h2>
        <div class="qr-image-wrap">
            <img src="{{ qr_data_uri }}" alt="QR Code" width="300" height="300" style="border-radius:12px;background:#fff;padding:8px;outline:1px solid rgba(0,0,0,0.1);outline-offset:-1px">
        </div>
        {% if event.checkin_code %}
        <div class="qr-code-label" data-zh="签到码" data-en="Check-in Code">签到码</div>
        <div class="qr-code-value">{{ event.checkin_code }}</div>
        {% endif %}
        <div style="margin-top:20px;position:relative;z-index:2">
            <a href="{{ url_for('event.detail', id=event.id) }}" class="card-link" data-zh="返回活动" data-en="Back to Event">返回活动</a>
        </div>
    </div>
</div>

<style>
    .qr-image-wrap {
        margin: 20px 0;
        position: relative;
        z-index: 2;
    }
    .qr-code-label {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        color: var(--ink-muted);
        letter-spacing: 1px;
        margin-bottom: 4px;
    }
    .qr-code-value {
        font-family: 'DM Sans', sans-serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 4px;
        color: var(--ink);
    }

    @media print {
        .nav, .site-footer, .card-link { display: none !important; }
        body { background: #fff !important; }
        .glass {
            background: none !important;
            backdrop-filter: none !important;
            box-shadow: none !important;
            border: 1px solid #ddd !important;
        }
        .glass::before, .glass::after { display: none !important; }
    }
</style>
{% endblock %}
