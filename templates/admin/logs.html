{% extends "base.html" %}
{% block title %}日志 - 管理面板{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2>{{ t("系统日志") }}</h2>
  <div>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-glass btn-sm">{{ t("返回面板") }}</a>
  </div>
</div>

<div class="log-viewer">
  <div class="log-header">
    <span class="log-filename">logs/app.log</span>
    <span class="log-lines">{{ total_lines }} {{ t("行") }}</span>
  </div>
  <pre class="log-content">{{ log_content }}</pre>
</div>

<div class="log-viewer mt-3">
  <div class="log-header">
    <span class="log-filename">{{ t("最近错误（最近50条）") }}</span>
  </div>
  <pre class="log-content log-errors">{{ error_lines }}</pre>
</div>
{% endblock %}
